name: SIGVIEW Calendar - Daily KRX Collection

on:
  # 매일 새벽 7:00 KST (UTC 22:00 전날)
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  collect-krx:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4
      
      - name: 🐍 Python 3.11 셋업
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 📅 KRX 거래소 일정 수집
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd sigcal
          python krx_collector.py
