name: SIGVIEW 잭팟 시즌2 v2.2 (pykrx + 4차함수)
on:
  schedule:
  - cron: '0 19 * * 6'  # 매주 토 19:00 UTC = 일 04:00 KST
  workflow_dispatch:
jobs:
  scan-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy scipy pykrx

      - name: Run scanner v2 (pykrx)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: python fetch_data_v2.py

      - name: Commit foreign-history-v2.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f foreign-history-v2.json ]; then
            git add foreign-history-v2.json
            git diff --cached --quiet || git commit -m "auto: update foreign-history-v2 $(date +%Y-%m-%d)"
            git push
          fi
