name: 워치리스트 일간 갱신

on:
  schedule:
    # 매일 21:30 UTC = 한국 다음날 06:30 (장 시작 전)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  update-watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 워치리스트 갱신
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: python watchlist_monitor.py
      
      - name: 결과 백업
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-${{ github.run_number }}
          path: watchlist_status.json
          retention-days: 14
