name: SIGVIEW 잭팟 시즌2 v2.0 (4차함수 c자리)

on:
  schedule:
    # 매주 토요일 18:00 UTC = 일요일 03:00 KST (시즌1과 다른 시간)
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  scan-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy scipy

      - name: Run scanner v2
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: python fetch_data_v2.py

      - name: Commit foreign-history-v2.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f foreign-history-v2.json ]; then
            git add foreign-history-v2.json
            git diff --cached --quiet || git commit -m "auto: update foreign-history-v2 $(date +%Y-%m-%d)"
            git push
          fi
